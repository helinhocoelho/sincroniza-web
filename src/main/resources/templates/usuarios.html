<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyncStock - Usuários</title>
    <link rel="icon" href="/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <img
            src="/images/logo-syncstock-sidebar.png"
            alt="SyncStock Logo"
            class="logo-sidebar"
          />
          <p>Gestão de Estoque</p>
        </div>
        <ul class="sidebar-menu">
          <li>
            <a href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
          </li>
          <li>
            <a href="/usuarios"><i class="fas fa-users"></i> Usuários</a>
          </li>
          <li>
            <a href="/unidades"><i class="fas fa-building"></i> Unidades</a>
          </li>
          <li>
            <a href="/setores"><i class="fas fa-folder"></i> Setores</a>
          </li>
          <li>
            <a href="/produtos"><i class="fas fa-box"></i> Produtos</a>
          </li>
          <li>
            <a href="/fornecedores"
              ><i class="fas fa-truck"></i> Fornecedores</a
            >
          </li>
          <li>
            <a href="/pedidos"><i class="fas fa-clipboard-list"></i> Pedidos</a>
          </li>
          <li>
            <a href="/estoque"><i class="fas fa-warehouse"></i> Estoque</a>
          </li>
          <li>
            <a href="/relatorios"
              ><i class="fas fa-chart-bar"></i> Relatórios</a
            >
          </li>
        </ul>
      </aside>
      <main class="main-content">
        <div class="top-bar">
          <h3>Usuários</h3>
          <div class="user-info">
            <span>👤 Administrador</span>
            <button class="logout-btn" onclick="logout()">Sair</button>
          </div>
        </div>
        <div class="content-area">
          <button
            class="btn btn-primary"
            style="width: auto; margin-bottom: 20px"
            onclick="abrirModal()"
          >
            + Novo Usuário
          </button>

          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Login</th>
                <th>Email</th>
                <th>Permissão</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaUsuarios">
              <tr>
                <td colspan="6" style="text-align: center">Carregando...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- Modal para cadastro/edição -->
    <div id="modalUsuario" class="modal">
      <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h3 id="modalTitulo">Novo Usuário</h3>
        <form id="usuarioForm">
          <input type="hidden" id="usuarioId" />
          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" required />
          </div>
          <div class="form-group">
            <label for="login">Login</label>
            <input type="text" id="login" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>
          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" />
            <small>Deixe em branco para manter a senha atual</small>
          </div>
          <div class="form-group">
            <label for="permissao">Permissão</label>
            <select id="permissao" required>
              <option value="">Selecione...</option>
              <option value="ADMINISTRADOR">Administrador</option>
              <option value="GERENTE">Gerente</option>
              <option value="SOLICITANTE">Solicitante</option>
            </select>
          </div>
          <div class="form-group">
            <label for="unidadeId">Unidade</label>
            <select id="unidadeId">
              <option value="">Selecione...</option>
            </select>
          </div>
          <div class="form-group">
            <label for="setorId">Setor</label>
            <select id="setorId">
              <option value="">Selecione...</option>
            </select>
          </div>
          <button type="submit" class="btn">Salvar</button>
        </form>
      </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
      let usuarioEditando = null;

      // Carregar unidades para o select
      async function carregarUnidades() {
        try {
          const response = await fetch("/api/unidades");
          const unidades = await response.json();
          const select = document.getElementById("unidadeId");
          select.innerHTML = '<option value="">Selecione...</option>';
          unidades.forEach((u) => {
            select.innerHTML += `<option value="${u.id}">${u.nome}</option>`;
          });
        } catch (error) {
          console.error("Erro ao carregar unidades:", error);
        }
      }

      // Carregar setores para o select
      async function carregarSetores() {
        try {
          const response = await fetch("/api/setores");
          const setores = await response.json();
          const select = document.getElementById("setorId");
          select.innerHTML = '<option value="">Selecione...</option>';
          setores.forEach((s) => {
            select.innerHTML += `<option value="${s.id}">${s.nome}</option>`;
          });
        } catch (error) {
          console.error("Erro ao carregar setores:", error);
        }
      }

      // Carregar lista de usuários
      async function carregarUsuarios() {
        try {
          const response = await fetch("/api/usuarios");
          const usuarios = await response.json();

          const tbody = document.getElementById("tabelaUsuarios");
          tbody.innerHTML = "";

          usuarios.forEach((u) => {
            const row = tbody.insertRow();
            row.innerHTML = `
                        <td>${u.id}</td>
                        <td>${u.nome}</td>
                        <td>${u.login}</td>
                        <td>${u.email}</td>
                        <td>${u.permissao?.nome || u.permissao || "-"}</td>
                        <td>
                            <button class="btn btn-small btn-edit" onclick="editarUsuario(${u.id})">Editar</button>
                            <button class="btn btn-small btn-delete" onclick="deletarUsuario(${u.id})">Excluir</button>
                        </td>
                    `;
          });
        } catch (error) {
          console.error("Erro ao carregar usuários:", error);
        }
      }

      // Abrir modal para novo usuário
      function abrirModal() {
        usuarioEditando = null;
        document.getElementById("modalTitulo").textContent = "Novo Usuário";
        document.getElementById("usuarioForm").reset();
        document.getElementById("usuarioId").value = "";
        document.getElementById("modalUsuario").classList.add("show");
      }

      // Editar usuário
      async function editarUsuario(id) {
        try {
          const response = await fetch(`/api/usuarios/${id}`);
          const usuario = await response.json();

          usuarioEditando = usuario;
          document.getElementById("modalTitulo").textContent = "Editar Usuário";
          document.getElementById("usuarioId").value = usuario.id;
          document.getElementById("nome").value = usuario.nome;
          document.getElementById("login").value = usuario.login;
          document.getElementById("email").value = usuario.email;
          document.getElementById("permissao").value = usuario.permissao;
          document.getElementById("unidadeId").value =
            usuario.unidade?.id || "";
          document.getElementById("setorId").value = usuario.setor?.id || "";
          document.getElementById("senha").value = "";

          document.getElementById("modalUsuario").classList.add("show");
        } catch (error) {
          mostrarAlerta("Erro ao carregar usuário", "error");
        }
      }

      // Deletar usuário
      async function deletarUsuario(id) {
        mostrarAlerta(
          "Tem certeza que deseja excluir este usuário?",
          "warning",
        );
        if (confirm("Tem certeza que deseja excluir este usuário?")) {
          try {
            await fetch(`/api/usuarios/${id}`, { method: "DELETE" });
            carregarUsuarios();
            mostrarAlerta("Usuário excluído com sucesso!", "success");
          } catch (error) {
            mostrarAlerta("Erro ao excluir usuário", "error");
          }
        }
      }

      // Fechar modal
      function fecharModal() {
        document.getElementById("modalUsuario").classList.remove("show");
      }

      // Salvar usuário
      document
        .getElementById("usuarioForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const usuario = {
            nome: document.getElementById("nome").value,
            login: document.getElementById("login").value,
            email: document.getElementById("email").value,
            permissao: document.getElementById("permissao").value,
            unidade: document.getElementById("unidadeId").value
              ? { id: parseInt(document.getElementById("unidadeId").value) }
              : null,
            setor: document.getElementById("setorId").value
              ? { id: parseInt(document.getElementById("setorId").value) }
              : null,
          };

          const senha = document.getElementById("senha").value;
          if (senha) {
            usuario.senhaHash = senha;
          }

          const usuarioId = document.getElementById("usuarioId").value;

          try {
            let response;
            if (usuarioId) {
              response = await fetch(`/api/usuarios/${usuarioId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(usuario),
              });
            } else {
              if (!senha) {
                mostrarAlerta("Senha é obrigatória para novo usuário");
                return;
              }
              response = await fetch("/api/usuarios", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(usuario),
              });
            }

            if (response.ok) {
              mostrarAlerta(
                usuarioId
                  ? "Usuário atualizado com sucesso!"
                  : "Usuário criado com sucesso!",
                "success",
              );
              fecharModal();
              carregarUsuarios();
            } else {
              const erro = await response.text();
              mostrarAlerta("Erro: " + erro, "error");
            }
          } catch (error) {
            mostrarAlerta("Erro ao salvar usuário");
          }
        });

      function logout() {
        window.location.href = "/login";
      }

      // Inicializar
      carregarUnidades();
      carregarSetores();
      carregarUsuarios();
    </script>
  </body>
</html>
