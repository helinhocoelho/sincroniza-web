<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyncStock - Unidades</title>
    <link rel="icon" href="/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <img
            src="/images/logo-syncstock-sidebar.png"
            alt="SyncStock Logo"
            class="logo-sidebar"
          />
          <p>Gestão de Estoque</p>
        </div>
        <ul class="sidebar-menu">
          <li>
            <a href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
          </li>
          <li>
            <a href="/usuarios"><i class="fas fa-users"></i> Usuários</a>
          </li>
          <li>
            <a href="/unidades"><i class="fas fa-building"></i> Unidades</a>
          </li>
          <li>
            <a href="/setores"><i class="fas fa-folder"></i> Setores</a>
          </li>
          <li>
            <a href="/produtos"><i class="fas fa-box"></i> Produtos</a>
          </li>
          <li>
            <a href="/fornecedores"
              ><i class="fas fa-truck"></i> Fornecedores</a
            >
          </li>
          <li>
            <a href="/pedidos"><i class="fas fa-clipboard-list"></i> Pedidos</a>
          </li>
          <li>
            <a href="/estoque"><i class="fas fa-warehouse"></i> Estoque</a>
          </li>
          <li>
            <a href="/relatorios"
              ><i class="fas fa-chart-bar"></i> Relatórios</a
            >
          </li>
        </ul>
      </aside>
      <main class="main-content">
        <div class="top-bar">
          <h3>Unidades</h3>
          <div class="user-info">
            <span>👤 Administrador</span>
            <button class="logout-btn" onclick="logout()">Sair</button>
          </div>
        </div>
        <div class="content-area">
          <button
            class="btn btn-primary"
            style="width: auto; margin-bottom: 20px"
            onclick="abrirModal()"
          >
            + Nova Unidade
          </button>
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Endereço</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaUnidades">
              <tr>
                <td colspan="6" style="text-align: center">Carregando...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- Modal -->
    <div id="modalUnidade" class="modal">
      <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h3 id="modalTitulo">Nova Unidade</h3>
        <form id="unidadeForm">
          <input type="hidden" id="unidadeId" />
          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" />
          </div>
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" />
          </div>
          <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" />
          </div>
          <button type="submit" class="btn">Salvar</button>
        </form>
      </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
      async function carregarUnidades() {
        try {
          const response = await fetch("/api/unidades");
          const unidades = await response.json();
          const tbody = document.getElementById("tabelaUnidades");
          tbody.innerHTML = "";
          unidades.forEach((u) => {
            const row = tbody.insertRow();
            row.innerHTML = `
                        <td>${u.id}</td>
                        <td>${u.nome}</td>
                        <td>${u.email || "-"}</td>
                        <td>${u.telefone || "-"}</td>
                        <td>${u.endereco || "-"}</td>
                        <td>
                            <button class="btn btn-small btn-edit" onclick="editarUnidade(${u.id})">Editar</button>
                            <button class="btn btn-small btn-delete" onclick="deletarUnidade(${u.id})">Excluir</button>
                        </td>
                    `;
          });
        } catch (error) {
          mostrarAlerta("Erro ao carregar unidades", "error");
        }
      }

      function abrirModal() {
        document.getElementById("modalTitulo").textContent = "Nova Unidade";
        document.getElementById("unidadeForm").reset();
        document.getElementById("unidadeId").value = "";
        document.getElementById("modalUnidade").classList.add("show");
      }

      async function editarUnidade(id) {
        try {
          const response = await fetch(`/api/unidades/${id}`);
          const unidade = await response.json();
          document.getElementById("modalTitulo").textContent = "Editar Unidade";
          document.getElementById("unidadeId").value = unidade.id;
          document.getElementById("nome").value = unidade.nome;
          document.getElementById("email").value = unidade.email || "";
          document.getElementById("telefone").value = unidade.telefone || "";
          document.getElementById("endereco").value = unidade.endereco || "";
          document.getElementById("modalUnidade").classList.add("show");
        } catch (error) {
          mostrarAlerta("Erro ao carregar unidade", "error");
        }
      }

      async function deletarUnidade(id) {
        if (confirm("Tem certeza que deseja excluir esta unidade?")) {
          try {
            await fetch(`/api/unidades/${id}`, { method: "DELETE" });
            mostrarAlerta("Unidade excluída com sucesso!", "success");
            carregarUnidades();
          } catch (error) {
            mostrarAlerta("Erro ao excluir unidade", "error");
          }
        }
      }

      function fecharModal() {
        document.getElementById("modalUnidade").classList.remove("show");
      }

      document
        .getElementById("unidadeForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const unidade = {
            nome: document.getElementById("nome").value,
            email: document.getElementById("email").value,
            telefone: document.getElementById("telefone").value,
            endereco: document.getElementById("endereco").value,
          };
          const id = document.getElementById("unidadeId").value;
          try {
            let response;
            if (id) {
              response = await fetch(`/api/unidades/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(unidade),
              });
            } else {
              response = await fetch("/api/unidades", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(unidade),
              });
            }
            if (response.ok) {
              mostrarAlerta(
                id ? "Unidade atualizada!" : "Unidade criada!",
                "success",
              );
              fecharModal();
              carregarUnidades();
            } else {
              const erro = await response.text();
              mostrarAlerta("Erro: " + erro, "error");
            }
          } catch (error) {
            mostrarAlerta("Erro ao salvar unidade", "error");
          }
        });

      function logout() {
        window.location.href = "/login";
      }
      carregarUnidades();
    </script>
  </body>
</html>
