<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyncStock - Setores</title>
    <link rel="icon" href="/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <img
            src="/images/logo-syncstock-sidebar.png"
            alt="SyncStock Logo"
            class="logo-sidebar"
          />
          <p>Gestão de Estoque</p>
        </div>
        <ul class="sidebar-menu">
          <li>
            <a href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
          </li>
          <li>
            <a href="/usuarios"><i class="fas fa-users"></i> Usuários</a>
          </li>
          <li>
            <a href="/unidades"><i class="fas fa-building"></i> Unidades</a>
          </li>
          <li>
            <a href="/setores"><i class="fas fa-folder"></i> Setores</a>
          </li>
          <li>
            <a href="/produtos"><i class="fas fa-box"></i> Produtos</a>
          </li>
          <li>
            <a href="/fornecedores"
              ><i class="fas fa-truck"></i> Fornecedores</a
            >
          </li>
          <li>
            <a href="/pedidos"><i class="fas fa-clipboard-list"></i> Pedidos</a>
          </li>
          <li>
            <a href="/estoque"><i class="fas fa-warehouse"></i> Estoque</a>
          </li>
          <li>
            <a href="/relatorios"
              ><i class="fas fa-chart-bar"></i> Relatórios</a
            >
          </li>
        </ul>
      </aside>
      <main class="main-content">
        <div class="top-bar">
          <h3>Setores</h3>
          <div class="user-info">
            <span>👤 Administrador</span>
            <button class="logout-btn" onclick="logout()">Sair</button>
          </div>
        </div>
        <div class="content-area">
          <button
            class="btn btn-primary"
            style="width: auto; margin-bottom: 20px"
            onclick="abrirModal()"
          >
            + Novo Setor
          </button>
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Unidade</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaSetores">
              <tr>
                <td colspan="3">Carregando...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- Modal -->
    <div id="modalSetor" class="modal">
      <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h3 id="modalTitulo">Novo Setor</h3>
        <form id="setorForm">
          <input type="hidden" id="setorId" />
          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" required />
          </div>
          <div class="form-group">
            <label for="unidadeId">Unidade</label>
            <select id="unidadeId" required></select>
          </div>
          <button type="submit" class="btn">Salvar</button>
        </form>
      </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
      let unidades = [];

      async function carregarUnidadesSelect() {
        const response = await fetch("/api/unidades");
        unidades = await response.json();
        const select = document.getElementById("unidadeId");
        select.innerHTML = '<option value="">Selecione...</option>';
        unidades.forEach((u) => {
          select.innerHTML += `<option value="${u.id}">${u.nome}</option>`;
        });
      }

      async function carregarSetores() {
        try {
          const response = await fetch("/api/setores");
          const setores = await response.json();
          const tbody = document.getElementById("tabelaSetores");
          tbody.innerHTML = "";
          setores.forEach((s) => {
            const row = tbody.insertRow();
            row.innerHTML = `
                        <td>${s.id}</td><td>${s.nome}</td><td>${s.unidade?.nome || "-"}</td>
                        <td><button class="btn btn-small btn-edit" onclick="editarSetor(${s.id})">Editar</button>
                        <button class="btn btn-small btn-delete" onclick="deletarSetor(${s.id})">Excluir</button></td>
                    `;
          });
        } catch (error) {
          mostrarAlerta("Erro ao carregar setores", "error");
        }
      }

      function abrirModal() {
        document.getElementById("modalTitulo").textContent = "Novo Setor";
        document.getElementById("setorForm").reset();
        document.getElementById("setorId").value = "";
        document.getElementById("modalSetor").classList.add("show");
      }

      async function editarSetor(id) {
        try {
          const response = await fetch(`/api/setores/${id}`);
          const setor = await response.json();
          document.getElementById("modalTitulo").textContent = "Editar Setor";
          document.getElementById("setorId").value = setor.id;
          document.getElementById("nome").value = setor.nome;
          document.getElementById("unidadeId").value = setor.unidade?.id || "";
          document.getElementById("modalSetor").classList.add("show");
        } catch (error) {
          mostrarAlerta("Erro ao carregar setor", "error");
        }
      }

      async function deletarSetor(id) {
        if (confirm("Tem certeza que deseja excluir este setor?")) {
          try {
            await fetch(`/api/setores/${id}`, { method: "DELETE" });
            mostrarAlerta("Setor excluído!", "success");
            carregarSetores();
          } catch (error) {
            mostrarAlerta("Erro ao excluir setor", "error");
          }
        }
      }

      function fecharModal() {
        document.getElementById("modalSetor").classList.remove("show");
      }

      document
        .getElementById("setorForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const setor = {
            nome: document.getElementById("nome").value,
            unidade: {
              id: parseInt(document.getElementById("unidadeId").value),
            },
          };
          const id = document.getElementById("setorId").value;
          try {
            let response;
            if (id) {
              response = await fetch(`/api/setores/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(setor),
              });
            } else {
              response = await fetch("/api/setores", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(setor),
              });
            }
            if (response.ok) {
              mostrarAlerta(
                id ? "Setor atualizado!" : "Setor criado!",
                "success",
              );
              fecharModal();
              carregarSetores();
            } else {
              const erro = await response.text();
              mostrarAlerta("Erro: " + erro, "error");
            }
          } catch (error) {
            mostrarAlerta("Erro ao salvar setor", "error");
          }
        });

      function logout() {
        window.location.href = "/login";
      }
      carregarUnidadesSelect();
      carregarSetores();
    </script>
  </body>
</html>
